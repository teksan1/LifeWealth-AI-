name: Build LifeWealth-AI APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Grant execute permission
      run: chmod +x gradlew || true

    - name: Build APK
      run: |
        if [ -f "./gradlew" ]; then
          ./gradlew assembleDebug
        else
          echo "No Gradle wrapper found yet - build will be added later"
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: LifeWealth-AI-APK
        path: app/build/outputs/apk/debug/*.apk
